<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGAS - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Estilos personalizados para que se vea igual a su diseño */
        body {
            background-color: #f8f9fa; /* Fondo gris claro */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .login-card {
            background-color: white;
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
        }
        .btn-ingresar {
            background-color: #7b1e35; /* Color guinda */
            color: white;
            font-weight: bold;
            padding: 10px;
        }
        .btn-ingresar:hover {
            background-color: #5a1526;
            color: white;
        }
        .enlace-olvido {
            color: #7b1e35;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .enlace-olvido:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <img src="../assets/logo.png" alt="Logo ITS" style="width: 80px; margin-bottom: 15px;">
        
        <h3 class="fw-bold mb-1">Instituto Tecnológico</h3>
        <h3 class="fw-bold mb-3">de Saltillo</h3>
        <p class="text-muted mb-4 small">Inicia sesión en tu cuenta institucional</p>

        <form>
            <div class="mb-3 text-start">
                <label for="correo" class="form-label fw-bold" style="font-size: 0.9rem;">Correo Institucional</label>
                <input type="email" class="form-control" id="correo" placeholder="alguien@saltillo.tecnm.mx" required>
            </div>
            
            <div class="mb-4 text-start">
                <label for="password" class="form-label fw-bold" style="font-size: 0.9rem;">Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-ingresar w-100 mb-3 text-white">Ingresar</button>
            
            <a href="#" class="enlace-olvido">¿Olvidaste tu contraseña?</a>
        </form>
    </div>

</body>
</html>
