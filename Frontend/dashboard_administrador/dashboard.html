<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGAS - Dashboard Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body {
            background-color: #f8f9fa; /* Fondo gris claro general */
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }
        /* Estilos del Menú Lateral */
        .sidebar {
            background-color: #0d1b2a; /* Azul muy oscuro */
            color: white;
            min-height: 100vh;
            padding-top: 20px;
        }
        .sidebar a {
            color: #a0aabf;
            text-decoration: none;
            padding: 15px 20px;
            display: block;
            font-weight: bold;
            font-size: 0.95rem;
        }
        .sidebar a:hover, .sidebar a.active {
            background-color: #1b263b;
            color: white;
            border-left: 4px solid #415a77;
        }
        .sidebar i {
            margin-right: 12px;
            font-size: 1.1rem;
        }
        /* Estilos del Contenido Principal */
        .main-content {
            padding: 40px;
        }
        .stat-card {
            background-color: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: none;
        }
        .stat-icon {
            font-size: 28px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            
            <div class="col-md-2 sidebar d-flex flex-column p-0">
                <h4 class="text-center mb-4 text-white fw-bold mt-3">
                    <i class="bi bi-layers"></i> Admin Panel
                </h4>
                
                <a href="#" class="active"><i class="bi bi-grid-1x2"></i> Inicio</a>
                <a href="#"><i class="bi bi-pc-display"></i> Catálogo de Equipos</a>
                <a href="#"><i class="bi bi-box-seam"></i> Catálogo de Materiales</a>
                <a href="#"><i class="bi bi-qr-code-scan"></i> Auditoría QR</a>
                <a href="#"><i class="bi bi-arrow-left-right"></i> Préstamos y Devoluciones</a>
                <a href="#"><i class="bi bi-people"></i> Usuarios</a>
                <a href="#"><i class="bi bi-file-earmark-text"></i> Reportes</a>
                
                <div class="mt-auto mb-4">
                    <a href="../pantalla_login/login.html"><i class="bi bi-box-arrow-left"></i> Cerrar Sesión</a>
                </div>
            </div>

            <div class="col-md-10 main-content">
                <h2 class="fw-bold mb-1">Dashboard</h2>
                <p class="text-muted mb-4">Resumen general del estado de inventario y préstamos.</p>

                <div class="row">
                    <div class="col-md-4">
                        <div class="stat-card d-flex justify-content-between align-items-center">
                            <div>
                                <p class="text-muted mb-1 small fw-bold text-uppercase">Equipos Prestados Hoy</p>
                                <h2 class="fw-bold mb-0">12</h2>
                            </div>
                            <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                                <i class="bi bi-display"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-4">
                        <div class="stat-card d-flex justify-content-between align-items-center">
                            <div>
                                <p class="text-muted mb-1 small fw-bold text-uppercase">Material con Bajo Stock</p>
                                <h2 class="fw-bold mb-0">3</h2>
                            </div>
                            <div class="stat-icon bg-warning bg-opacity-10 text-warning">
                                <i class="bi bi-exclamation-triangle"></i>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="stat-card d-flex justify-content-between align-items-center">
                            <div>
                                <p class="text-muted mb-1 small fw-bold text-uppercase">Equipos en Mantenimiento</p>
                                <h2 class="fw-bold mb-0">5</h2>
                            </div>
                            <div class="stat-icon bg-secondary bg-opacity-10 text-secondary">
                                <i class="bi bi-wrench"></i>
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
            
        </div>
    </div>
</body>
</html>
